<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>birdhouse calculator · old school abacus</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Birdhouse Running</h1>
    <div class="tagline">Hunter XP, nests &amp; seeds per run</div>
    <div class="back"><a href="index.html">&larr; all calculators</a></div>
  </header>

  <div class="field">
    <label for="type">Birdhouse type</label>
    <select id="type"></select>
  </div>
  <div class="field">
    <label for="runs">Number of runs</label>
    <input type="number" id="runs" min="0" step="1" value="100" />
  </div>
  <div class="field">
    <label for="built">Build them yourself? (Crafting XP)</label>
    <input type="checkbox" id="built" checked />
  </div>

  <h2>Totals</h2>
  <div class="results" id="results"></div>
  <p class="note">4 birdhouses per run, 10 seeds each. Nests are an average estimate.</p>

  <script type="module" src="js/birdhouse.js"></script>
</body>
</html>
