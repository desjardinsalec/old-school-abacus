<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Membership cost calculator · old school abacus</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Membership Damage</h1>
    <div class="tagline">what OSRS has really cost you</div>
    <div class="back"><a href="index.html">&larr; all calculators</a></div>
  </header>

  <div class="field">
    <label for="years">Years subscribed</label>
    <input type="number" id="years" min="0" step="0.5" value="10" />
  </div>
  <div class="field">
    <label for="monthly">Price per month (USD)</label>
    <input type="number" id="monthly" min="0" step="0.01" value="14.99" />
  </div>

  <h2>The damage</h2>
  <div class="results" id="results"></div>
  <p class="note">For entertainment only. No actual financial advice was harmed in the making of this calculator.</p>

  <script type="module" src="js/membership.js"></script>
</body>
</html>
