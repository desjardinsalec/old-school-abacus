<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ironman calculator · old school abacus</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Ironman Calculator</h1>
    <div class="tagline">estimate your ironman account efficiency</div>
    <div class="back"><a href="index.html">&larr; all calculators</a></div>
  </header>

  <div class="field">
    <label for="type">Account type</label>
    <select id="type"></select>
  </div>
  <div class="field">
    <label for="total">Total level</label>
    <input type="number" id="total" min="0" step="1" value="1500" />
  </div>
  <div class="field">
    <label for="hours">Hours played</label>
    <input type="number" id="hours" min="0" step="1" value="500" />
  </div>
  <div class="field">
    <label for="calc">&nbsp;</label>
    <button id="calc" type="button">calculate</button>
  </div>

  <div id="output" hidden>
    <h2>Result</h2>
    <div class="results" id="results"></div>
  </div>

  <script type="module" src="js/ironman.js"></script>
</body>
</html>
